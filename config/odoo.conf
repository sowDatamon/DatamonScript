[options]
; Conexión a la base de datos (sobreescrita por variables de entorno del contenedor)
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; Rendimiento
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Seguridad
list_db = True
; admin_passwd = cambia_esta_clave_maestra

; Rutas
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo
logfile = /var/log/odoo/odoo.log
log_level = info

; Longpolling (chat, notificaciones en tiempo real)
longpolling_port = 8072
